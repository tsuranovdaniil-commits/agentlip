services:
  # ==========================================
  # ПРОЕКТ 1: ГЛОБАЛЬНЫЙ МОЗГ (Global Server)
  # ==========================================
  global_qdrant:
    image: qdrant/qdrant:latest
    container_name: global_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./data/global_qdrant:/qdrant/storage

  global_broker:
    build: 
      context: .
      dockerfile: Dockerfile.broker
    container_name: global_broker
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://global_qdrant:6333
    depends_on:
      - global_qdrant

  # ==========================================
  # ПРОЕКТ 2: ЛОКАЛЬНЫЙ АГЕНТ (Универсальный шаблон)
  # (В будущем этот блок будет вынесен в отдельный репозиторий)
  # ==========================================
  local_qdrant:
    image: qdrant/qdrant:latest
    container_name: local_qdrant
    restart: unless-stopped
    ports:
      - "6334:6333"
    volumes:
      - ./data/local_qdrant:/qdrant/storage

  local_agent_api:
    build: 
      context: .
      dockerfile: Dockerfile.agent_api
    container_name: local_agent_api
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - MINISTRY_ID=min_example
      - GLOBAL_BROKER_URL=http://global_broker:8000
    depends_on:
      - local_qdrant
